<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traditional Telugu Wedding Invitation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff2e6;
            color: #7a7a7a;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            margin: auto;
            padding: 20px;
            border: 5px solid #d4af37;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #b30000;
            font-size: 2.5em;
        }
        h2 {
            color: #b30000;
            margin: 20px 0;
        }
        .details {
            background-color: #ffeb99;
            padding: 15px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9em;
            color: #707070;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>శ్రమణ వేదిక</h1>
        <h2>మీరు ఆహ్వానితులు</h2>
        <div class="details">
            <p><strong>తేదీ:</strong> 23-04-2026</p>
            <p><strong>సమయం:</strong> 10:16 AM</p>
            <p><strong>వేదిక:</strong> Koratla</p>
            <p><strong>సమన్వయాలు:</strong> KSFP Koratla</p>
        </div>
        <p class="footer">ఈ వేడుకలో మీ ఉనికికి మేము ఎంతో ఆనందంగా ఉంటాము!</p>
    </div>
</body>
</html>
